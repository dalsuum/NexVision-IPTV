<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NexVision Cast Receiver</title>

  <!--
    CAF v3 Receiver SDK — must load synchronously before any cast.framework
    usage. Registers the <cast-media-player> custom element and the global
    cast.framework namespace. Load from Google's CDN; do not self-host.
  -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <!--
    HLS.js — used as the actual MSE playback engine for HLS streams.
    Pinned to the same version used in tv/index.html for consistency.
    Attaches to the <video> inside <cast-media-player>'s shadow DOM after
    the framework has processed the LOAD request.
  -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>

  <!--
    NexVision brand fonts — loaded non-blocking; the UI falls back to Georgia
    while they arrive, so there is no render-blocking penalty.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet">

  <link rel="stylesheet" href="/cast-receiver/receiver.css">
</head>

<body>

  <!--
    CAF-managed media player.
    The framework creates a <video> element inside this custom element's
    shadow DOM and wires it to all sender ↔ receiver protocol messages.
    HLS.js will attach to that same <video> after the LOAD interceptor fires.
  -->
  <cast-media-player></cast-media-player>

  <!-- NexVision branding overlay — pointer-events:none, never blocks the player -->
  <div id="nv-shell" aria-hidden="true">

    <!-- Buffering / connecting spinner -->
    <div id="nv-spinner" class="show">
      <div class="nv-ring"></div>
      <div class="nv-wordmark">NexVision</div>
    </div>

    <!-- Channel info bar: revealed on each LOAD, auto-hides after 5 s -->
    <div id="nv-info">
      <div class="nv-eyebrow">NexVision IPTV</div>
      <div class="nv-channel-row">
        <img id="nv-logo" alt="" style="display:none">
        <div id="nv-channel-name">—</div>
      </div>
      <div id="nv-subtitle"></div>
      <div class="nv-live">
        <div class="nv-live-dot"></div>
        LIVE
      </div>
    </div>

    <!-- Fatal stream error — auto-dismisses after 8 s -->
    <div id="nv-error">
      <div class="nv-error-icon">📡</div>
      <div id="nv-error-msg">Stream unavailable</div>
    </div>

  </div><!-- #nv-shell -->

  <script src="/cast-receiver/receiver.js"></script>
</body>
</html>
