# ─────────────────────────────────────────────────────────────────────────────
# NexVision IPTV — Nginx Production Configuration
# Supports 500+ simultaneous HLS streams via X-Accel-Redirect (kernel-level
# file serving — Python never touches a video byte).
#
# Install:  sudo cp nexvision.conf /etc/nginx/sites-available/nexvision
#           sudo ln -s /etc/nginx/sites-available/nexvision /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Upstream Gunicorn socket
upstream nexvision_app {
    server unix:/run/nexvision/gunicorn.sock fail_timeout=0;
    keepalive 64;                    # persistent connections to Gunicorn
}

# ── Playlist cache zone (shared memory for .m3u8 metadata) ───────────────────
proxy_cache_path /var/cache/nexvision/hls
    levels=1:2
    keys_zone=hls_cache:10m
    max_size=500m
    inactive=60s
    use_temp_path=off;

# ── General proxy cache zone (API responses) ──────────────────────────────────
proxy_cache_path /var/cache/nexvision/api
    levels=1:2
    keys_zone=api_cache:20m
    max_size=200m
    inactive=120s
    use_temp_path=off;

# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;                  # replace with your domain or LAN IP

    access_log  /var/log/nginx/nexvision_access.log  combined buffer=64k flush=5s;
    error_log   /var/log/nginx/nexvision_error.log   warn;

    # ── Global limits ─────────────────────────────────────────────────────────
    client_max_body_size 4G;        # allow large VOD uploads
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # ── Gzip for API/JSON responses ───────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # =========================================================================
    # STATIC FILE SERVING (bypasses Python entirely)
    # =========================================================================

    # TV client — served as pure static HTML/JS/CSS
    location / {
        root /opt/nexvision/web/tv;
        try_files $uri $uri/index.html @flask;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Admin panel — served as pure static HTML/JS/CSS
    location /admin/ {
        alias /opt/nexvision/web/admin/;
        try_files $uri $uri/index.html @flask;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # =========================================================================
    # X-ACCEL-REDIRECT — Nginx serves .ts segments at kernel level
    # Flask authenticates → returns X-Accel-Redirect header → Nginx serves file
    # Python never reads the video bytes. Handles 500 streams on a single CPU.
    # =========================================================================

    # Internal location: only reachable via X-Accel-Redirect, NOT from outside
    location /internal/vod/ {
        internal;
        alias /opt/nexvision/vod/;  # must match HLS_DIR / UPLOADS_DIR in app.py

        # Performance headers for video segments
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";

        # Nginx sends the file directly — no buffering to userspace
        sendfile on;
        tcp_nopush on;

        # Enable range requests (required for video seeking)
        add_header Accept-Ranges bytes;
    }

    # HLS .m3u8 playlists — routed through Flask (auth + X-Accel) then cached briefly
    location ~* ^/vod/hls/(.+)\.m3u8$ {
        proxy_pass http://nexvision_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Cache playlist for 5 seconds — reduces DB hits during rapid segment loads
        proxy_cache         hls_cache;
        proxy_cache_key     "$uri";
        proxy_cache_valid   200 5s;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # .ts segment routes — Flask authenticates, returns X-Accel-Redirect
    location ~* ^/vod/hls/.+\.ts$ {
        proxy_pass http://nexvision_app;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;             # stream immediately, don't buffer in Nginx memory
    }

    # VOD thumbnails — direct static serve
    location /vod/thumbnails/ {
        alias /opt/nexvision/vod/thumbnails/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # =========================================================================
    # API PROXY — all /api/* and /vod/api/* go to Gunicorn
    # =========================================================================
    location @flask {
        proxy_pass http://nexvision_app;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;
        proxy_read_timeout 120s;

        # HTTP/1.1 keepalive to Gunicorn
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/ {
        proxy_pass http://nexvision_app;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    location /vod/ {
        proxy_pass http://nexvision_app;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;        # long timeout for FFmpeg transcode jobs
        client_max_body_size 4G;
    }
}
